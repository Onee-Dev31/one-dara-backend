name: PR Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # --- Gate 1: Code Quality (ESLint) ----------------------------------------
  code-quality:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npx eslint "{src,apps,libs,test}/**/*.ts" --format=compact

  # --- Gate 2: Test Coverage >= 80% -----------------------------------------
  test-coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.cov.outputs.summary }}
      lines_pct: ${{ steps.cov.outputs.lines_pct }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        id: cov
        run: |
          npm run test:cov -- --coverageReporters=text-summary 2>&1 | tee coverage.txt || true

          SUMMARY=$(grep -E "^(Statements|Branches|Functions|Lines)" coverage.txt || echo "No coverage data")
          SUMMARY_ENCODED=$(echo "$SUMMARY" | tr '\n' '|')
          echo "summary=$SUMMARY_ENCODED" >> "$GITHUB_OUTPUT"

          LINES_PCT=$(grep "^Lines" coverage.txt | grep -oE '[0-9]+\.[0-9]+' | head -1 || echo "0")
          echo "lines_pct=$LINES_PCT" >> "$GITHUB_OUTPUT"

          if grep -q "^FAIL" coverage.txt; then
            echo "Tests failed"
            exit 1
          fi

          LINES_INT=$(echo "$LINES_PCT" | cut -d. -f1)
          if [ "${LINES_INT:-0}" -lt 80 ]; then
            echo "Coverage ${LINES_PCT}% is below the required 80% threshold"
            exit 1
          fi

  # --- Gate 3: Security Audit ------------------------------------------------
  security:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: npm audit (critical only)
        run: npm audit --audit-level=critical

  # --- Summary Comment -------------------------------------------------------
  summary:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: [code-quality, test-coverage, security]
    if: always()
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          COV_SUMMARY: ${{ needs.test-coverage.outputs.summary }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = (r) => r === 'success';
            const qualityOk  = passed('${{ needs.code-quality.result }}');
            const coverageOk = passed('${{ needs.test-coverage.result }}');
            const securityOk = passed('${{ needs.security.result }}');
            const allOk = qualityOk && coverageOk && securityOk;

            const icon = (ok) => ok ? '✅' : '❌';
            const linesPct   = '${{ needs.test-coverage.outputs.lines_pct }}';
            const covSummary = (process.env.COV_SUMMARY || 'ไม่มีข้อมูล').replace(/\|/g, '\n');

            const body = [
              `## ${allOk ? '🟢' : '🔴'} PR Gates Report`,
              '',
              '| Gate | สถานะ |',
              '|------|-------|',
              `| 🔍 Code Quality (ESLint) | ${icon(qualityOk)} ${qualityOk ? 'Passed' : 'Failed'} |`,
              `| 🧪 Coverage (${linesPct}%) | ${icon(coverageOk)} ${coverageOk ? 'Passed' : 'Failed'} |`,
              `| 🔒 Security | ${icon(securityOk)} ${securityOk ? 'No critical issues' : 'Critical issues found'} |`,
              '',
              '<details><summary>Coverage Details</summary>',
              '',
              '```',
              covSummary,
              '```',
              '',
              '</details>',
              '',
              allOk
                ? '> ✅ ผ่านทุก gate แล้ว! PR นี้พร้อม merge'
                : '> ❌ มี gate ที่ไม่ผ่าน กรุณาแก้ไขก่อน merge',
              '',
              '<sub>Generated by [PR Gates](.github/workflows/pr-gates.yml)</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('PR Gates Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
