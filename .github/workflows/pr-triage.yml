name: PR Triage

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Install & Test ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test
        run: |
          npm run test:cov -- --coverageReporters=text-summary 2>&1 | tee coverage.txt || true
          SUMMARY=$(grep -E "^(Statements|Branches|Functions|Lines)" coverage.txt || echo "No coverage data")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if grep -q "FAIL" coverage.txt; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi

      # ─── Get PR diff stats ────────────────────────────────────────────
      - name: Get PR diff stats
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > pr.diff
          LINES=$(wc -l < pr.diff)
          ADDED=$(grep -c "^+" pr.diff || true)
          REMOVED=$(grep -c "^-" pr.diff || true)
          FILES=$(grep -c "^diff --git" pr.diff || true)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "removed=$REMOVED" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # ─── Post comment ─────────────────────────────────────────────────
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const testStatus = '${{ steps.test.outputs.status }}';
            const testEmoji  = testStatus === 'passed' ? '✅' : '❌';
            const coverage   = `${{ steps.test.outputs.summary }}`;
            const files      = '${{ steps.diff.outputs.files }}';
            const added      = '${{ steps.diff.outputs.added }}';
            const removed    = '${{ steps.diff.outputs.removed }}';

            const body = [
              '## PR Triage Report',
              '',
              '### ไฟล์ที่เปลี่ยนแปลง',
              `| ไฟล์ | เพิ่ม | ลบ |`,
              `|------|------|----|`,
              `| ${files} files | +${added} lines | -${removed} lines |`,
              '',
              `### ${testEmoji} Test Suite`,
              '```',
              coverage || 'ไม่มีข้อมูล coverage',
              '```',
              '',
              '<sub>Generated by [PR Triage workflow](.github/workflows/pr-triage.yml)</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Triage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
